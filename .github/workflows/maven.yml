name: API Tests

on:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Future-proof Node.js

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build project (skip tests here)
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Run API tests (Surefire picks up testng.xml)
      - name: Run Selenium Tests
        run: mvn test

      # 5. Upload Surefire reports
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Find Extent Report
        id: find_report
        run: |
          REPORT_FILE=$(ls reports/Test-Result_*.html | head -n 1)
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: ${{ steps.find_report.outputs.report_file }}

      # 6. Upload Extent Report as artifact
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: reports/*.html

      # 7. Publish summary in GitHub Actions UI
      - name: Publish Test Summary
        if: always()
        run: |
          echo "### 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          REPORT=target/surefire-reports/TEST-TestSuite.xml
          if [ -f "$REPORT" ]; then
            PASSED=$(grep -oP 'tests="\K[0-9]+' "$REPORT")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$REPORT")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' "$REPORT")
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$REPORT")
            ACTUAL_PASSED=$((PASSED - FAILURES - ERRORS - SKIPPED))
            echo "- ✅ Passed: $ACTUAL_PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- ❌ Failures: $FAILURES" >> $GITHUB_STEP_SUMMARY
            echo "- ⚠️ Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️ Skipped: $SKIPPED" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Surefire report found." >> $GITHUB_STEP_SUMMARY
          fi
